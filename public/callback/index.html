<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhisperWind Blog - 正在授权...</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f9f5e7;
      color: #4a4a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 30px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 8px;
      box-shadow: 0 8px 15px -3px rgba(210, 180, 140, 0.12), 0 4px 8px -4px rgba(92, 82, 74, 0.06);
    }
    h1 {
      color: #81896c;
      margin-bottom: 20px;
    }
    p {
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .loading {
      display: inline-block;
      width: 50px;
      height: 50px;
      border: 3px solid rgba(129, 137, 108, 0.2);
      border-radius: 50%;
      border-top-color: #81896c;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>正在完成授权...</h1>
    <div class="loading"></div>
    <p>请稍等，我们正在处理你的GitHub授权请求。<br>完成后将自动跳转到管理界面。</p>
  </div>

  <script>
    // 此脚本处理GitHub OAuth回调并将令牌发送到CMS
    (function() {
      // 提取URL中的代码参数
      const code = new URLSearchParams(window.location.search).get('code');
      const state = new URLSearchParams(window.location.search).get('state');
      
      if (code && state) {
        console.log("接收到GitHub授权码，准备重定向到管理界面");
        
        // 获取正确的base路径
        const basePath = window.location.hostname.includes('github.io') 
          ? '/WhisperWind-blog' 
          : '';
          
        // 构建重定向URL，包含授权参数
        const redirectUrl = `${basePath}/admin/#github-${state}-${code}`;
        
        // 短暂延迟后重定向
        setTimeout(() => {
          console.log("重定向到:", redirectUrl);
          window.location.href = redirectUrl;
        }, 1500);
      } else {
        console.error("未能获取GitHub授权码");
        document.querySelector('p').innerHTML = 
          "授权过程中出现错误。<br>请返回并重试，或联系管理员。";
      }
    })();
  </script>
</body>
</html>
