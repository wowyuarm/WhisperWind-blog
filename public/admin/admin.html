<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>正在跳转到管理页面...</title>
    <script>
      // 检查当前环境并进行适当的重定向
      (function() {
        // 获取当前URL的基础路径
        const basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/admin/'));
        
        // 检查是否在GitHub Pages环境
        const isGitHubPages = window.location.hostname.includes('github.io');
        
        if (isGitHubPages) {
          // GitHub Pages环境
          window.location.href = '/WhisperWind-blog/admin/' + window.location.search;
        } else {
          // 本地环境
          window.location.href = basePath + '/admin/index.html' + window.location.search;
        }
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=./index.html">
  </head>
  <body>
    <p>正在跳转到管理页面，如果没有自动跳转，请<a href="./index.html">点击这里</a>。</p>
  </body>
</html>
