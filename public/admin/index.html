<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhisperWind Blog CMS</title>
    <!-- Removed Netlify Identity Widget script -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <!-- Include the configuration -->
    <script>
      // Wait for the DOM to be fully loaded before initializing CMS
      document.addEventListener('DOMContentLoaded', function() {
        // Initialize CMS. It will automatically look for config.yml in the same directory.
        CMS.init(); 
      });
    </script>
  </head>
  <body>
    <!-- Decap CMS mounts its UI in this div -->
    <div id="nc-root"></div>
  </body>
</html>
