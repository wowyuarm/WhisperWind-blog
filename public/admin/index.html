<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhisperWind Blog - 内容管理</title>
  
  <!-- 必须先加载Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  
  <!-- 强制配置Netlify Identity -->
  <script>
    // 等待Netlify Identity Widget加载完成
    document.addEventListener('DOMContentLoaded', function() {
      // 定义Netlify站点URL
      const NETLIFY_SITE = "tiny-pegasus-ea211b.netlify.app";
      const API_URL = `https://${NETLIFY_SITE}/.netlify/identity`;
      
      console.log("配置Netlify Identity Widget...");
      
      if (window.netlifyIdentity) {
        // 替换默认API端点
        const originalInit = window.netlifyIdentity.init;
        
        // 显示详细日志
        console.log("已加载Netlify Identity Widget");
        console.log("正在替换默认API端点:", API_URL);
        
        // 拦截和修改初始化过程
        window.netlifyIdentity.init = function(options) {
          options = options || {};
          options.APIUrl = API_URL;
          console.log("强制设置Netlify Identity API地址:", options.APIUrl);
          return originalInit.call(this, options);
        };
        
        // 立即初始化以应用设置
        window.netlifyIdentity.init({
          APIUrl: API_URL,
          locale: 'zh'
        });
        
        // 设置事件监听器
        window.netlifyIdentity.on("init", user => {
          console.log("Netlify Identity初始化完成", user ? "用户已登录" : "用户未登录");
        });
        
        window.netlifyIdentity.on("error", err => {
          console.error("Netlify Identity错误:", err);
        });
        
        window.netlifyIdentity.on("login", () => {
          console.log("用户登录成功");
          if (!document.location.pathname.endsWith('/admin/')) {
            const basePath = window.location.hostname.includes('github.io') 
              ? '/WhisperWind-blog' 
              : '';
            document.location.href = `${basePath}/admin/`;
          }
        });
      } else {
        console.error("错误: Netlify Identity Widget未能加载!");
      }
    });
  </script>
</head>
<body>
  <!-- 加载Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <!-- CMS配置 -->
  <script>
    // 防止CMS自动初始化
    window.CMS_MANUAL_INIT = true;
    
    // 在页面完全加载后初始化CMS
    window.addEventListener('load', function() {
      console.log("页面加载完成，准备初始化CMS");
      
      // 等待Netlify Identity完全初始化
      setTimeout(function() {
        console.log("开始初始化CMS...");
        
        // 强制使用Git Gateway配置
        const config = {
          backend: {
            name: "git-gateway",
            repo: "wowyuarm/WhisperWind-blog",
            branch: "main",
            site_domain: "tiny-pegasus-ea211b.netlify.app",
            base_url: "https://tiny-pegasus-ea211b.netlify.app"
          },
          load_config_file: false
        };
        
        // 初始化CMS
        try {
          window.CMS.init({ config: config });
          console.log("CMS初始化成功");
        } catch (e) {
          console.error("CMS初始化失败:", e);
        }
      }, 1000); // 给Netlify Identity一些时间完全初始化
    });
  </script>
</body>
</html>
