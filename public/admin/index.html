<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="robots" content="noindex" />
    
    <!-- 安全设置 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval' blob: data:;">
    
    <title>WhisperWind Blog CMS</title>
    
    <!-- 样式 -->
    <style>
      /* 自定义样式 */
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      #nc-root {
        height: 100vh;
      }
    </style>

    <!-- 处理GitHub Pages路径 -->
    <script>
      if (window.location.hostname === 'wowyuarm.github.io') {
        window.CMS_PATH_PREFIX = '/WhisperWind-blog';
      }
    </script>
  </head>
  <body>
    <!-- CMS挂载点 -->
    <div id="nc-root"></div>
    
    <!-- 加载CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <!-- 初始化CMS -->
    <script>
      // 配置CMS
      window.CMS_MANUAL_INIT = true;

      // 等待CMS加载完成
      window.addEventListener('load', function() {
        // 设置GitHub Pages路径前缀
        if (window.location.hostname === 'wowyuarm.github.io') {
          window.CMS_PATH_PREFIX = '/WhisperWind-blog';
        }

        // 初始化CMS
        CMS.init({
          config: {
            backend: {
              name: 'github',
              repo: 'wowyuarm/WhisperWind-blog',
              branch: 'main',
              auth_type: 'implicit',
              app_id: '85bb9693d96ed2c4abd9',
              auth_endpoint: 'https://github.com/login/oauth/authorize'
            }
          }
        });

        // 监听认证消息
        window.addEventListener('message', function(event) {
          if (event.data.type === 'oauth' && event.data.provider === 'github') {
            console.log('Received OAuth token');
            localStorage.setItem('github-token', event.data.token);
            window.location.reload();
          }
        });
      });
    </script>
  </body>
</html>
