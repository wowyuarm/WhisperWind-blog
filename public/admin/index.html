<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="robots" content="noindex" />
    
    <!-- 安全设置 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval' blob: data:;">
    
    <title>WhisperWind Blog CMS</title>
    
    <!-- 样式 -->
    <style>
      /* 自定义样式 */
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      #nc-root {
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- CMS挂载点 -->
    <div id="nc-root"></div>
    
    <!-- 加载CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <!-- 初始化CMS -->
    <script>
      // 设置GitHub Pages路径前缀
      if (window.location.hostname === 'wowyuarm.github.io') {
        window.CMS_PATH_PREFIX = '/WhisperWind-blog';
      }

      // 初始化CMS
      try {
        CMS.init({
          backend: {
            name: 'github',
            repo: 'wowyuarm/WhisperWind-blog',
            branch: 'main',
            base_url: 'https://github.com',
            auth_endpoint: 'login/oauth/authorize',
            app_id: '85bb9693d96ed2c4abd9'
          },
          load_config_file: false,
          media_folder: 'public/uploads',
          public_folder: '/uploads',
          locale: 'zh_Hans'
        });
      } catch (error) {
        console.error('CMS initialization error:', error);
      }

      // 处理OAuth回调
      if (window.location.hash && window.location.hash.startsWith('#access_token=')) {
        const token = window.location.hash.match(/access_token=([\w/\-]+)/)[1];
        localStorage.setItem('netlify-cms-user', JSON.stringify({ token }));
        window.location.href = window.location.pathname;
      }
    </script>
  </body>
</html>
