backend:
  name: github
  repo: wowyuarm/WhisperWind-blog
  branch: main
  auth_type: implicit
  app_id: 85bb9693d96ed2c4abd9

# Set locale to Simplified Chinese
locale: 'zh_Hans'

# GitHub Pages环境配置
publish_mode: editorial_workflow
site_url: https://wowyuarm.github.io/WhisperWind-blog/
display_url: https://wowyuarm.github.io/WhisperWind-blog/
logo_url: https://wowyuarm.github.io/WhisperWind-blog/images/logo.png

# 媒体和公共路径配置
media_folder: public/uploads
public_folder: /uploads

# 内容集合
collections:
  # 博客文章集合
  - name: "blog"
    label: "博客文章"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "publishDate", widget: "datetime" }
      - { label: "描述", name: "description", widget: "text" }
      - { label: "特色图片", name: "featuredImage", widget: "image", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  # 单页面集合
  - name: "pages"
    label: "页面"
    folder: "src/content/pages"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "URL路径", name: "permalink", widget: "string" }
      - { label: "内容", name: "body", widget: "markdown" }

  # 友链数据文件 (Corrected to use 'files')
  - name: "links"
    label: "友情链接"
    files: # Use 'files' list
      - label: "友情链接列表"
        name: "friend_links" # Unique name for this file definition
        file: "src/content/links.json" # The actual file path
        fields:
          - label: "链接"
            name: "links"
            widget: "list"
            fields:
              - { label: "名称", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "描述", name: "description", widget: "string", required: false }
              - { label: "图标", name: "icon", widget: "image", required: false }

  # 网站配置 (Corrected to use 'files')
  - name: "config"
    label: "网站配置"
    files: # Use 'files' list
      - label: "基本配置"
        name: "site_config" # Unique name for this file definition
        file: "src/content/config.json" # The actual file path
        fields:
          - { label: "网站标题", name: "title", widget: "string" }
          - { label: "网站描述", name: "description", widget: "text" }
          - { label: "网站作者", name: "author", widget: "string" }
          - { label: "网站Logo", name: "logo", widget: "image", required: false }
          - label: "社交链接"
            name: "social"
            widget: "object"
            fields:
              [
                { label: "GitHub", name: "github", widget: "string", required: false },
                { label: "Twitter", name: "twitter", widget: "string", required: false },
                { label: "微博", name: "weibo", widget: "string", required: false },
                { label: "知乎", name: "zhihu", widget: "string", required: false }
              ] 